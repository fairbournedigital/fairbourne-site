<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fairbourne Digital</title>

  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #0B1F3A;
      color: #FFFFFF;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 80px;
    }

    header {
      margin-bottom: 120px;
    }

    .logo {
      width: 260px;
    }

    .hero {
      max-width: 600px;
    }

    h1 {
      font-size: 60px;
      line-height: 1.1;
      margin: 0 0 20px 0;
      font-weight: 600;
    }

    p {
      font-size: 20px;
      color: #F5F7FA;
      margin-bottom: 32px;
    }

.btn {
  display: inline-block;
  background-color: #D8B44A;
  color: #0B1F3A;
  padding: 14px 28px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.2s ease;
}

.btn:hover {
  background-color: #E6C15A;
}

.btn:active {
  background-color: #B8962E;
}

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 40px;
      }

      p {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    
    <header>
      <img src="logograd.svg" alt="Fairbourne Digital" class="logo">
    </header>

    <section class="hero">
      <h1>Digital systems that actually work for SMEs</h1>

      <p>
        Microsoft 365, automation and practical transformation without the fluff.
      </p>

<a href="mailto:hello@fairbournedigital.com?subject=Enquiry from website&body=Hi, I’d like to discuss..." class="btn">
  Send A Message
</a>
    </section>

  </div>

</body>
</html>
